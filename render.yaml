services:
  # PostgreSQL database
  - type: pserv
    name: cafeteria-db
    plan: free

  # Backend - Node.js API
  - type: web
    name: cafeteria-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromService:
          name: cafeteria-db
          type: pserv
          property: connectionString
    rootDir: backend

  # Frontend - React
  - type: web
    name: cafeteria-frontend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx serve -s build
    rootDir: frontend
