services:
  - type: pserv
    name: cafeteria-db
    plan: free

  - type: web
    name: cafeteria-backend
    runtime: node
    plan: free
    rootDir: Backend
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cafeteria-db
          property: connectionString

  - type: web
    name: cafeteria-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://cafeteria-backend.onrender.com/api
