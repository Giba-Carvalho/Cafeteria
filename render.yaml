services:
  # Database PostgreSQL
  - type: pserv
    name: cafeteria-db
    databaseName: cafeteria
    user: cafeteria_user
    plan: free

  # Backend API
  - type: web
    name: cafeteria-backend
    env: node
    plan: free
    rootDir: Backend
    buildCommand: npm ci
    startCommand: npm start
    dockerfilePath: ""
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cafeteria-db
          property: connectionString

  # Frontend Static Site
  - type: web
    name: cafeteria-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    dockerfilePath: ""
    envVars:
      - key: REACT_APP_API_URL
        value: https://cafeteria-backend.onrender.com/api
