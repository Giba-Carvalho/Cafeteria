databases:
  - name: cafeteria-db
    databaseName: cafeteria
    user: cafeteria_user
    plan: free
    region: oregon

services:
  - type: web
    name: cafeteria-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: Backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: cafeteria-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://cafeteria-frontend.onrender.com

  - type: web
    name: cafeteria-frontend
    runtime: static
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://cafeteria-backend.onrender.com/api
