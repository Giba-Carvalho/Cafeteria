services:
  # Database
  - type: pserv
    name: cafeteria-db
    databaseName: cafeteria
    user: cafeteria_user
    plan: free

  # Backend API
  - type: web
    name: cafeteria-backend
    env: node
    plan: free
    buildCommand: cd Backend && npm install
    startCommand: cd Backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cafeteria-db
          property: connectionString
    autoDeploy: true

  # Frontend
  - type: web
    name: cafeteria-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && REACT_APP_API_URL=https://cafeteria-backend.onrender.com/api npm run build
    staticPublishPath: frontend/build
    autoDeploy: true
